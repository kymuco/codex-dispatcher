name: Bug report
description: Report a reproducible problem in Codex Dispatcher
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please include enough detail for us to reproduce quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps, commands, and inputs.
      placeholder: |
        1. Run ...
        2. Send command ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `codex-dispatcher --version` if available.
      placeholder: "0.1.0"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Codex CLI version, and shell.
      placeholder: Windows 11, Python 3.13, codex x.y.z, PowerShell
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      description: Paste relevant logs. Remove secrets before posting.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I checked existing issues and did not find a duplicate.
          required: true
        - label: I removed secrets and private tokens from logs and screenshots.
          required: true
